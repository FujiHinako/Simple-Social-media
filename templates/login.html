<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login / Sign Up - ProfileApp</title>
  <!-- Bootstrap + MDB (already in layout) -->
</head>
<body>
  <div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="row w-100 justify-content-center">
      <div class="col-lg-5 col-md-7 col-11">
        <!-- Card -->
        <div class="card shadow-3-strong rounded-5 mb-4">
          <!-- Tab navs -->
          <ul class="nav nav-pills nav-pills-candy rounded-top-pill px-3" id="pills-tabLogin" role="tablist">
            <li class="nav-item" role="presentation">
              <button class="nav-link active px-4 py-2 rounded-5 flex-fill" id="pills-login-tab" data-mdb-toggle="pill" data-mdb-target="#pills-login" role="tab"
                aria-controls="pills-login" aria-selected="true">
                <i class="fas fa-sign-in-alt me-2"></i>Login
              </button>
            </li>
            <li class="nav-item" role="presentation">
              <button class="nav-link px-4 py-2 rounded-5 flex-fill" id="pills-signup-tab" data-mdb-toggle="pill" data-mdb-target="#pills-signup" role="tab"
                aria-controls="pills-signup" aria-selected="false">
                <i class="fas fa-user-plus me-2"></i>Sign Up
              </button>
            </li>
          </ul>

          <!-- Error -->
          {ERROR_MSG}

          <!-- Login tab -->
          <form id="login-form" method="POST" action="login_handler.php" class="needs-validation card-body px-5 py-4">
            <input type="hidden" name="action" value="login">
            <div class="form-outline mb-4">
              <input type="email" id="login-email" class="form-control form-control-lg" name="email" required />
              <label class="form-label" for="login-email">Email</label>
            </div>
            <div class="form-outline mb-4">
              <input type="password" id="login-password" class="form-control form-control-lg" name="password" required />
              <label class="form-label" for="login-password">Password</label>
            </div>
            <button type="submit" class="btn btn-primary btn-lg btn-block w-100 mb-0">
              Sign in
            </button>
          </form>

          <!-- Signup tab -->
          <form id="signup-form" method="POST" action="login_handler.php" class="needs-validation card-body px-5 py-4" style="display: none;">
            <input type="hidden" name="action" value="signup">
            <div class="row">
              <div class="col-md-6 mb-4">
                <div class="form-outline">
                  <input type="text" id="signup-first" class="form-control form-control-lg" name="first_name" required />
                  <label class="form-label" for="signup-first">First name</label>
                </div>
              </div>
              <div class="col-md-6 mb-4">
                <div class="form-outline">
                  <input type="text" id="signup-last" class="form-control form-control-lg" name="last_name" required />
                  <label class="form-label" for="signup-last">Last name</label>
                </div>
              </div>
            </div>
            <div class="form-outline mb-4">
              <input type="email" id="signup-email" class="form-control form-control-lg" name="email" required />
              <label class="form-label" for="signup-email">Email</label>
            </div>
            <div class="form-outline mb-4">
              <input type="password" id="signup-password" class="form-control form-control-lg" name="password" minlength="6" required />
              <label class="form-label" for="signup-password">Password (min 6 chars)</label>
            </div>
            <div class="form-outline mb-4">
              <input type="password" id="signup-confirm" class="form-control form-control-lg" name="confirm_password" required />
              <label class="form-label" for="signup-confirm">Confirm Password</label>
            </div>
            <div id="pass-match" class="alert alert-danger" style="display: none;">Passwords don't match!</div>
            <button type="submit" class="btn btn-primary btn-lg btn-block w-100 mb-0" onclick="return validateSignup()">
              Create account
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Tab switching
    const loginTab = document.getElementById('pills-login-tab');
    const signupTab = document.getElementById('pills-signup-tab');
    const loginForm = document.getElementById('login-form');
    const signupForm = document.getElementById('signup-form');

    loginTab.addEventListener('click', () => {
      loginTab.classList.add('active');
      signupTab.classList.remove('active');
      loginForm.style.display = 'block';
      signupForm.style.display = 'none';
    });

    signupTab.addEventListener('click', () => {
      signupTab.classList.add('active');
      loginTab.classList.remove('active');
      signupForm.style.display = 'block';
      loginForm.style.display = 'none';
    });

    // Signup validation
    function validateSignup() {
      const pass1 = document.getElementById('signup-password').value;
      const pass2 = document.getElementById('signup-confirm').value;
      const matchEl = document.getElementById('pass-match');
      if (pass1 !== pass2) {
        matchEl.style.display = 'block';
        setTimeout(() => matchEl.style.display = 'none', 5000);
        return false;
      }
      return true;
    }
  </script>
</body>
</html>
