<div class="auth-container">
    <div class="auth-tabs">
        <button class="tab-btn active" onclick="showTab('login')">Login</button>
        <button class="tab-btn" onclick="showTab('signup')">Sign Up</button>
    </div>
    
    {ERROR_MSG}

    <!-- Login Form -->
    <form id="login-form" method="POST" action="login_handler.php" class="auth-form active">
        <input type="hidden" name="action" value="login">
        <label>Email</label>
        <input type="email" name="email" required>
        
        <label>Password</label>
        <input type="password" name="password" required>
        
        <button type="submit" class="btn-signup-main">Sign In</button>
    </form>

    <!-- Signup Form -->
    <form id="signup-form" method="POST" action="login_handler.php" class="auth-form">
        <input type="hidden" name="action" value="signup">
        
        <label>First Name *</label>
        <input type="text" name="first_name" required>
        
        <div class="middle-name-group">
            <label><input type="checkbox" id="no-middle" onclick="toggleMiddle()"> I don't have middle name</label>
            <input type="text" name="middle_name" id="middle_name">
        </div>
        
        <label>Last Name *</label>
        <input type="text" name="last_name" required>
        
        <label>Email *</label>
        <input type="email" name="email" required>
        
        <label>Password (min 6 chars) *</label>
        <input type="password" name="password" id="password" minlength="6" required>
        
        <label>Confirm Password *</label>
        <input type="password" name="confirm_password" id="confirm_password" required>
        
        <div id="pass-match" style="display: none;">Passwords do not match</div>
        
        <button type="submit" class="btn-signup-main" onclick="return validateSignup()">Create Account</button>
    </form>
</div>

<script>
    function showTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.auth-form').forEach(form => form.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById(tab + '-form').classList.add('active');
    }

    function toggleMiddle() {
        const middle = document.getElementById('middle_name');
        middle.style.display = document.getElementById('no-middle').checked ? 'none' : 'block';
        if (document.getElementById('no-middle').checked) middle.value = '';
    }

    function validateSignup() {
        const pass1 = document.getElementById('password').value;
        const pass2 = document.getElementById('confirm_password').value;
        const matchEl = document.getElementById('pass-match');
        if (pass1 !== pass2) {
            matchEl.style.display = 'block';
            matchEl.className = 'error-msg';
            return false;
        }
        matchEl.style.display = 'none';
        return true;
    }
</script>

<style>
    .auth-container {
        max-width: 500px;
        margin: 80px auto 0;
        padding: 0 1rem;
    }
    
    .auth-tabs {
        display: flex;
        border-bottom: 2px solid #ddd;
        margin-bottom: 2rem;
    }
    
    .tab-btn {
        flex: 1;
        padding: 1rem;
        background: none;
        border: none;
        font-weight: 600;
        cursor: pointer;
        color: #666;
    }
    
    .tab-btn.active {
        color: #0073b1;
        border-bottom: 2px solid #0073b1;
    }
    
    .auth-form {
        display: none;
    }
    
    .auth-form.active {
        display: block;
    }
    
    .middle-name-group label {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.9rem;
    }
    
    .middle-name-group input[type="checkbox"] {
        width: auto;
    }
    
    .error-msg {
        background: #fee;
        color: #c33;
        padding: 0.75rem;
        border-radius: 6px;
        margin-bottom: 1rem;
    }
</style>
