<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style-fixed.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body>
  <div class="profile-container">
  <div class="profile-cover" style="background-image: url('{COVER_PHOTO}');"></div>

  <section class="profile-header">
    <div class="profile-photo-wrap">
      <img src="{PROFILE_PHOTO}" alt="Profile" class="profile-photo" onerror="this.src='https://via.placeholder.com/200?text=Profile';">
    </div>
    <div class="profile-info">
      <h1>{USER_FULL_NAME}</h1>
      <p class="profile-bio">{USER_BIO}</p>
      <p class="profile-email">{USER_EMAIL}</p>
      {EDIT_BUTTON}
    </div>
  </section>

  <nav class="profile-tabs" role="tablist" aria-label="Profile tabs">
    <button class="profile-tab active" data-tab="posts" type="button">Posts</button>
    <button class="profile-tab" data-tab="photos" type="button">Photos</button>
    <button class="profile-tab" data-tab="friends" type="button">Friends</button>
  </nav>

  <section class="tab-content active" id="posts-tab">
    <div class="posts-section">{USER_POSTS_LIST}</div>
  </section>

  <section class="tab-content" id="photos-tab">
    <div class="photo-gallery"><div class="gallery-grid">{GALLERY_HTML}</div></div>
  </section>

  <section class="tab-content" id="friends-tab">
    <div class="users-grid">{FRIENDS_LIST}</div>
  </section>
</div>

</body>
</html>
