<div class="profile-container">
  <div class="profile-cover" style="background-image: url('{COVER_PHOTO}')"></div>
  <div class="profile-header-overlay">
    <img src="{PROFILE_PHOTO}" alt="Profile" class="profile-photo">
    <div class="profile-info">
      <h1>{USER_FULL_NAME}</h1>
      <p class="profile-bio">{USER_BIO}</p>
      <p class="profile-email">{USER_EMAIL}</p>
      {EDIT_BUTTON}
    </div>
  </div>

  <div class="profile-tabs">
    <div class="profile-tab active" onclick="showTab('posts')">Posts</div>
    <div class="profile-tab" onclick="showTab('photos')">Photos</div>
    <div class="profile-tab" onclick="showTab('friends')">Friends</div>
  </div>

  <div class="tab-content active" id="posts-tab">
    <div class="posts-section">
      {USER_POSTS_LIST}
    </div>
  </div>
  
  <div class="tab-content" id="photos-tab">
    <div class="photo-gallery">
      <div class="gallery-grid">
        {GALLERY_HTML}
      </div>
    </div>
  </div>
  
  <div class="tab-content" id="friends-tab">
    <div class="users-grid">
      {FRIENDS_LIST}
    </div>
  </div>
</div>
