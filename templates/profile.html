<div class="cover-photo">
    <img src="{COVER_PHOTO}" style="width:100%;height:200px;object-fit:cover;">
</div>
<div class="profile-photo">
    <img src="{PROFILE_PHOTO}" style="width:120px;height:120px;border-radius:50%;margin-top:-60px;border:3px solid #fff;">
</div>
<h2>{USER_FULL_NAME}</h2>
<p>{USER_BIO}</p>
<p>{USER_EMAIL}</p>
{EDIT_BUTTON}

<div class="profile-tabs">
    <button class="tab-btn" onclick="showTab('photos')">Photos</button>
    <button class="tab-btn" onclick="showTab('friends')">Friends</button>
</div>
<div id="photos" class="tab-content">{GALLERY_HTML}</div>
<div id="friends" class="tab-content">{FRIENDS_LIST}</div>

<h3>Posts</h3>
<div class="posts">{USER_POSTS_LIST}</div>
