<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{PAGE_TITLE} - ProfileApp</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script>
        // Common functions
        function toggleMobileMenu() {
            const menu = document.getElementById('mobileMenu');
            if (menu) menu.classList.toggle('open');
        }
        document.addEventListener('click', function(e) {
            const hamburger = e.target.closest('.hamburger');
            const menu = document.getElementById('mobileMenu');
            if (!hamburger && menu && menu.classList.contains('open')) {
                toggleMobileMenu();
            }
        });
    </script>
    {PAGE_HEAD}
</head>
<body>
    <nav class="navbar">
        <a href="homepage.php" class="navbar-brand">
            <img src="https://t3.ftcdn.net/jpg/03/46/83/96/360_F_346839683_6nAPzbhpSkIpb8pmAwufkC7c5eD7wYws.jpg" alt="Logo">
            Profile<span>App</span>
        </a>
        <div class="navbar-search">
            <input type="search" placeholder="Search profiles...">
        </div>
        <div class="navbar-nav">
            <a href="homepage.php" class="nav-link" title="Home"><i class="fas fa-home"></i></a>
            <a href="profile.php{PROFILE_LINK}" class="nav-link" title="Profile"><i class="fas fa-user"></i></a>
            {AUTH_SECTION}
        </div>
        <div class="hamburger" onclick="toggleMobileMenu()" title="Menu"><i class="fas fa-bars"></i></div>
        <div class="mobile-menu" id="mobileMenu">
            <a href="homepage.php" class="nav-link"><i class="fas fa-home"></i> Home</a>
            <a href="profile.php{PROFILE_LINK}" class="nav-link"><i class="fas fa-user"></i> Profile</a>
            {MOBILE_AUTH}
        </div>
    </nav>
    <main class="main-content">
        {MAIN_CONTENT}
    </main>
    {PAGE_SCRIPT}
</body>
</html>
