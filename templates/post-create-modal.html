<div class="modal fade post-modal" id="postCreateModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content border-0 shadow-xl rounded-3xl">
      <div class="modal-header border-0 pb-3">
        <h5 class="modal-title fw-bold">Create Post</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form id="postCreateForm" enctype="multipart/form-data">
        <div class="modal-body p-0">
          <div class="p-4 border-bottom">
            <textarea name="content" id="modalTextarea" class="form-control border-0 fs-5 fw-medium" rows="4" placeholder="What do you want to talk about?" maxlength="1000" required style="resize:none; min-height:120px;"></textarea>
          </div>
          <div class="image-preview-container p-4 border-bottom d-none">
            <img id="imagePreview" class="img-fluid rounded-3" style="max-height:300px;">
          </div>
          <div class="p-4">
            <div class="row g-2">
              <div class="col">
                <label class="form-control border-dashed border-2 text-muted cursor-pointer">
                  📎 Add Photo
                  <input type="file" name="image" accept="image/*" class="d-none">
                </label>
              </div>
              <div class="col-auto">
                <button type="submit" class="btn btn-primary px-4 py-2 fw-bold rounded-pill shadow-sm">
                  Post
                </button>
              </div>
            </div>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
